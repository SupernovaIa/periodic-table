<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Periodic Table</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#0b0f1a">
  <meta name="description" content="Interactive periodic table and Standard Model of particle physics — bilingual EN/ES.">
  <meta property="og:title" content="Interactive Periodic Table">
  <meta property="og:description" content="Explore the 118 elements and the Standard Model of particles. Bilingual EN/ES.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta property="og:image" content="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <p class="eyebrow" id="subtitle">Chemistry · Interactive</p>
      <h1 id="title">Interactive Periodic Table</h1>
    </div>
    <div class="header-right">
      <div class="header-switches">
        <div class="view-switch" id="view" role="group" aria-label="View">
          <button type="button" data-view="elements">Elements</button>
          <button type="button" data-view="particles">Particles</button>
          <button type="button" data-view="molecules">Molecules</button>
        </div>
        <div class="lang-switch" id="lang" role="group" aria-label="Language">
          <button type="button" data-lang="en" aria-label="English">EN</button>
          <span class="lang-sep" aria-hidden="true">/</span>
          <button type="button" data-lang="es" aria-label="Español">ES</button>
        </div>
      </div>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="9" cy="9" r="6"/><line x1="13.5" y1="13.5" x2="18" y2="18" stroke-linecap="round"/>
        </svg>
        <input type="search" id="search" placeholder="Search name or symbol…" autocomplete="off">
      </div>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="controls-row">
        <div class="colorby" id="colorby" role="group" aria-label="Color by property">
          <span class="colorby-label" id="colorby-label">Color by</span>
          <div class="colorby-pills">
            <button type="button" data-prop="category" class="active"></button>
            <button type="button" data-prop="state"></button>
            <button type="button" data-prop="temp"></button>
            <button type="button" data-prop="eneg"></button>
            <button type="button" data-prop="dens"></button>
            <button type="button" data-prop="melt"></button>
            <button type="button" data-prop="boil"></button>
            <button type="button" data-prop="mass"></button>
          </div>
        </div>
        <div class="statefilter" id="statefilter" role="group" aria-label="Filter by state">
          <span class="statefilter-label" id="statefilter-label">Filter</span>
          <div class="statefilter-pills">
            <button type="button" data-state="all" class="active"><span></span></button>
            <button type="button" data-state="solid"><i></i><span></span></button>
            <button type="button" data-state="liquid"><i></i><span></span></button>
            <button type="button" data-state="gas"><i></i><span></span></button>
          </div>
        </div>
      </div>
      <div class="temp-control" id="temp-control" hidden>
        <span class="temp-label" id="temp-label">Temperature</span>
        <span class="temp-readout" id="temp-readout"></span>
        <input type="range" id="temp-range" min="0" max="6000" step="5" value="295" aria-label="Temperature (K)">
        <span class="state-legend" id="state-legend-inline"></span>
      </div>
      <div class="trend-legend" id="trend-legend" hidden></div>
      <div class="timeline" id="timeline">
        <button type="button" class="timeline-toggle" id="timeline-toggle" aria-pressed="false"></button>
        <div class="timeline-slider" id="timeline-slider" hidden>
          <span class="timeline-upto" id="timeline-upto"></span>
          <input type="range" id="timeline-range" min="1599" max="2010" step="1" value="2010" aria-label="Year">
          <span class="timeline-year" id="timeline-year"></span>
          <span class="timeline-count" id="timeline-count"></span>
        </div>
        <button type="button" class="timeline-toggle" id="compare-toggle" aria-pressed="false"></button>
      </div>
    </section>

    <div class="table-scroll">
      <div class="periodic-table" id="table"></div>
      <div class="particle-table" id="particle-table" hidden></div>
      <div class="molecule-table" id="molecule-table" hidden></div>
    </div>

    <div class="legend-bar">
      <div class="legend" id="legend"></div>
      <div class="legend" id="particle-legend" hidden></div>
      <div class="legend" id="molecule-legend" hidden></div>
    </div>
  </main>

  <div class="overlay" id="overlay" hidden></div>
  <aside class="detail-panel" id="detail" hidden aria-live="polite"></aside>
  <div class="compare-panel" id="compare-panel" hidden>
    <div class="compare-inner" id="compare-inner"></div>
  </div>

  <footer class="site-footer">
    <span id="footer-text">118 elements · data for educational purposes</span>
  </footer>

  <script src="data.js"></script>
  <script src="images.js"></script>
  <script src="particles.js"></script>
  <script src="molecules.js"></script>
  <script src="app.js"></script>
</body>
</html>
