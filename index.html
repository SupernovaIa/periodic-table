<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Periodic Table</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="theme-color" content="#0b0f1a">
  <meta name="description" content="Interactive periodic table and Standard Model of particle physics — bilingual EN/ES.">
  <meta property="og:title" content="Interactive Periodic Table">
  <meta property="og:description" content="Explore the 118 elements and the Standard Model of particles. Bilingual EN/ES.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta property="og:image" content="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="lang-switch" id="lang" role="group" aria-label="Language">
      <button type="button" data-lang="en" aria-label="English">
        <svg class="flag" viewBox="0 0 20 14" aria-hidden="true">
          <rect width="20" height="14" fill="#012169"/>
          <g stroke="#fff" stroke-width="2.6"><path d="M0,0 L20,14"/><path d="M20,0 L0,14"/></g>
          <g stroke="#C8102E" stroke-width="1.3"><path d="M0,0 L20,14"/><path d="M20,0 L0,14"/></g>
          <path d="M10,0 V14 M0,7 H20" stroke="#fff" stroke-width="4"/>
          <path d="M10,0 V14 M0,7 H20" stroke="#C8102E" stroke-width="2.2"/>
        </svg><span>EN</span>
      </button>
      <button type="button" data-lang="es" aria-label="Español">
        <svg class="flag" viewBox="0 0 20 14" aria-hidden="true">
          <rect width="20" height="14" fill="#AA151B"/>
          <rect y="3.5" width="20" height="7" fill="#F1BF00"/>
        </svg><span>ES</span>
      </button>
    </div>
    <h1 id="title">Interactive Periodic Table</h1>
    <p class="subtitle" id="subtitle">Click any element to see its full profile</p>
    <div class="view-switch" id="view" role="group" aria-label="View">
      <button type="button" data-view="elements">Elements</button>
      <button type="button" data-view="particles">Particles</button>
    </div>
  </header>

  <main>
    <section class="controls">
      <div class="search-box">
        <input type="search" id="search" placeholder="Search by name, symbol or number…" autocomplete="off">
      </div>
      <div class="legend" id="legend"></div>
      <div class="legend" id="particle-legend" hidden></div>
      <div class="colorby" id="colorby" role="group" aria-label="Color by property">
        <span class="colorby-label" id="colorby-label">Color by</span>
        <div class="colorby-pills">
          <button type="button" data-prop="category" class="active"></button>
          <button type="button" data-prop="eneg"></button>
          <button type="button" data-prop="dens"></button>
          <button type="button" data-prop="melt"></button>
          <button type="button" data-prop="boil"></button>
          <button type="button" data-prop="mass"></button>
        </div>
      </div>
      <div class="trend-legend" id="trend-legend" hidden></div>
      <div class="timeline" id="timeline">
        <button type="button" class="timeline-toggle" id="timeline-toggle" aria-pressed="false"></button>
        <div class="timeline-slider" id="timeline-slider" hidden>
          <span class="timeline-upto" id="timeline-upto"></span>
          <input type="range" id="timeline-range" min="1599" max="2010" step="1" value="2010" aria-label="Year">
          <span class="timeline-year" id="timeline-year"></span>
          <span class="timeline-count" id="timeline-count"></span>
        </div>
        <button type="button" class="timeline-toggle" id="compare-toggle" aria-pressed="false"></button>
      </div>
    </section>

    <div class="table-scroll">
      <div class="periodic-table" id="table"></div>
      <div class="particle-table" id="particle-table" hidden></div>
    </div>
  </main>

  <div class="overlay" id="overlay" hidden></div>
  <aside class="detail-panel" id="detail" hidden aria-live="polite"></aside>
  <div class="compare-panel" id="compare-panel" hidden>
    <div class="compare-inner" id="compare-inner"></div>
  </div>

  <footer class="site-footer">
    <span id="footer-text">118 elements · data for educational purposes</span>
  </footer>

  <script src="data.js"></script>
  <script src="images.js"></script>
  <script src="particles.js"></script>
  <script src="app.js"></script>
</body>
</html>
