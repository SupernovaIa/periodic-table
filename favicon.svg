<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8ec5ff"/>
      <stop offset="1" stop-color="#c48bff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#c48bff" stop-opacity=".55"/>
      <stop offset="1" stop-color="#c48bff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100" height="100" rx="24" fill="#0b0f1a"/>
  <circle cx="50" cy="50" r="42" fill="url(#glow)"/>

  <!-- particle cloud -->
  <g fill="url(#g)">
    <!-- outer ring (smaller, fainter) -->
    <circle cx="81.4" cy="63.0" r="3" opacity=".7"/>
    <circle cx="63.0" cy="81.4" r="3" opacity=".7"/>
    <circle cx="37.0" cy="81.4" r="3" opacity=".7"/>
    <circle cx="18.6" cy="63.0" r="3" opacity=".7"/>
    <circle cx="18.6" cy="37.0" r="3" opacity=".7"/>
    <circle cx="37.0" cy="18.6" r="3" opacity=".7"/>
    <circle cx="63.0" cy="18.6" r="3" opacity=".7"/>
    <circle cx="81.4" cy="37.0" r="3" opacity=".7"/>
    <!-- inner ring -->
    <circle cx="70" cy="50" r="4.2"/>
    <circle cx="60" cy="32.7" r="4.2"/>
    <circle cx="40" cy="32.7" r="4.2"/>
    <circle cx="30" cy="50" r="4.2"/>
    <circle cx="40" cy="67.3" r="4.2"/>
    <circle cx="60" cy="67.3" r="4.2"/>
  </g>

  <!-- nucleus -->
  <circle cx="50" cy="50" r="9.5" fill="#fff"/>
  <circle cx="50" cy="50" r="9.5" fill="url(#g)" opacity=".65"/>
</svg>
